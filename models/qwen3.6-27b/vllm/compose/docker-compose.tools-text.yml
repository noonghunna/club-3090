# ===========================================================================
# Tools-text variant — long single prompts (RAG, summarization, large doc Q&A)
# without vision. Best for workloads that don't need image input but DO need
# more context than the 48K default's prefill envelope.
#
# Drops the MoonViT vision encoder (saves ~0.86 GB VRAM) and spends that
# budget on KV cache → context grows to 75K. fp8 KV avoids the GDN cliff
# at 50-60K single prompts (we tested up to 60K-token depth on this variant).
# Same MTP n=3 spec-decode as the default; same throughput class.
#
# Measured: 53 narr / 70 code TPS (CV 0.5-2.6%).
#
# All single-card variants in this dir:
#
#   Compose file                          Max ctx   Narr/Code TPS   KV     Vision   Status
#   docker-compose.yml (default)            48K       51 / 68       TQ3    ✅       ⭐ recommended
#   docker-compose.fast-chat.yml            20K       55 / 70       fp8    ✅       fastest at small ctx
#   docker-compose.tools-text.yml (this)    75K       53 / 70       fp8    ❌       long single prompts
#   docker-compose.no-genesis-mtp.yml       20K       55 / 68       fp8    ✅       same as fast-chat minus Genesis
#   docker-compose.minimal.yml              32K       32 / 33       fp8    ✅       no spec-decode, simplest
#
# Run with:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f docker-compose.tools-text.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../../../../models-cache}:/root/.cache/huggingface
      # Genesis v7.14+ modular package (replaces patch_genesis_unified.py).
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      # Genesis v7.14+ opt-in patches (fp8 KV path — no P4/P65/P67 needed)
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      # P68/P69 deliberately DISABLED (2026-04-29). They override user
      # tool_choice / inject "must use a tool" reminders when the prompt
      # exceeds 8000 chars — IDE-agent system prompts blow past that on
      # the first message and get silent stops on greetings / clarifying
      # questions. Bisected on club-3090 issue #2 (HoodOG1 + tenitram).
      # Set to 1 only if you specifically want forced-tool-call behavior.
      # - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      # - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
      # PN8 (v7.62.x): MTP draft online-quant propagation. Targets fp8+MTP
      # path specifically — frees ~600 MiB by inheriting target quant config
      # into the draft head. Sandermage's claim: closes Cliff 1 on this path.
      - GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        python3 -m vllm._genesis.patches.apply_all
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "75000"
      - --gpu-memory-utilization
      - "0.97"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "2048"
      # fp8_e5m2 (not turboquant) — required for tool calls to work with MTP.
      - --kv-cache-dtype
      - fp8_e5m2
      # Dropping the MoonViT vision tower frees ~0.86 GB for KV cache,
      # pushing max_model_len from 20K → 75K vs docker-compose.tools.yml.
      - --language-model-only
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
