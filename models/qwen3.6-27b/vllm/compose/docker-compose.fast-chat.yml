# ===========================================================================
# Fast-chat variant — best TPS at small context (≤20K).
#
# This is NOT the default — the default is `docker-compose.yml` (single-card
# 48K + Genesis P65 + TurboQuant 3-bit KV). Pick this file ONLY when:
#   - You only need ≤20K context (chat-only workloads)
#   - You want the fastest single-stream TPS available on a single 3090
#   - You don't want vision tower active during boot (slightly faster cold start)
#
# Config: MTP spec-decode n=3 + fp8_e5m2 KV + vision enabled.
# Measured: 55 narr / 70 code TPS (CV 1-3% across 5 measured runs).
#
# All single-card variants in this dir:
#
#   Compose file                          Max ctx   Narr/Code TPS   KV     Status
#   docker-compose.yml (default)            48K       51 / 68       TQ3    ⭐ recommended
#   docker-compose.fast-chat.yml (this)     20K       55 / 70       fp8    fastest at small ctx
#   docker-compose.tools-text.yml           75K       53 / 70       fp8    long single prompts (no vision)
#   docker-compose.no-genesis-mtp.yml       20K       55 / 68       fp8    same as fast-chat minus Genesis (control)
#   docker-compose.minimal.yml              32K       32 / 33       fp8    no spec-decode, simplest
#
# Run with:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f docker-compose.fast-chat.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b:
    # Pinned to the exact nightly we tested and the Genesis patches verified against.
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      # Genesis v7.14+ modular package (mounted into vLLM's site-packages).
      # Replaces the old patch_genesis_unified.py shim path which Sandermage
      # removed when migrating to the modular layout. Apply via
      # `python3 -m vllm._genesis.patches.apply_all` at boot.
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      # Standalone .tolist() cudagraph capture-guard fix (separate bug from
      # any single Genesis patch). Equivalent functionality also ships as
      # Genesis P78 since v7.14 (with attribution); both running together
      # is harmless (idempotent), running just one is sufficient.
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      # Genesis v7.14+ opt-in patches relevant to fp8 KV + MTP path.
      # We don't enable P4 (TurboQuant-hybrid) — fp8 KV doesn't need it.
      # We don't enable P65/P67 — fp8 KV doesn't trigger #40880 cudagraph bug.
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        python3 -m vllm._genesis.patches.apply_all
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "20000"
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "2048"
      # fp8_e5m2 KV — NOT turboquant — because MTP + turboquant collapses on tool-call prompts.
      - --kv-cache-dtype
      - fp8_e5m2
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
