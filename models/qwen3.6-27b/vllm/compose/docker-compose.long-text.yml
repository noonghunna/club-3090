# ===========================================================================
# Long-text variant — 185K context, text-only (no vision).
#
# Stack: same as default + long-vision (vLLM nightly + Genesis v7.64 with the
# full v7.64 patch stack — PN12 anchor sidecar, compile-safe sidecar, PN17,
# P104, P37/P38, TurboQuant 3-bit KV, MTP n=3) — with the vision tower
# disabled to free ~1 GB of VRAM. We backed off from the original 218K +
# 0.985 to 185K + 0.975 on 2026-05-01 PM after P37/P38 testing surfaced the
# downstream FA varlen workspace cliff at 50K-token single-shot tool prefills
# — see docs/CLIFFS.md "Update 2026-05-01 PM" for the full forensics. The
# new ceiling passes verify-full + 33K-token (130K-char) tool-prefill stress
# cleanly; 50K-token (200K-char) synthetic stress still cliffs but is well
# beyond realistic agent workloads.
#
# Recommended client max_tokens: 8192 (FREE thinking on this compose; budget
# for hard reasoning runs). 16384 for competition-grade problems. See
# docs/EXAMPLES.md "max_tokens defaults" section for the full table.
#
# When to pick this over long-vision:
#   - You don't need image input
#   - You want the absolute maximum context on a single 3090
#   - You're doing very long single-shot text workloads (book-length docs,
#     whole-codebase analysis, large RAG retrievals)
#
# When NOT to pick this:
#   - Anything that needs vision — use long-vision (198K + vision) instead
#   - Tool-using agents — same prefill-OOM caveat as long-vision applies
#     here. Use the default 48K for production agents.
#
# Measured (R3''' bench row, 2026-04-27):
#   50.11 narr / 65.84 code TPS, CV 1.5-1.9%, AL 3.44-3.57 (81-85% per-pos),
#   VRAM 21.5/24 GB. ~5% slower code than long-vision (more KV pool to manage)
#   and same caveats — within 2% of long-vision narr.
#
# Cliff caveat (must read):
#   - Cliff 1 (tool-prefill OOM at 25K+ tool messages) is MOSTLY closed on
#     this variant as of 2026-04-30 PM via two local sidecars + 0.985
#     mem-util. Verify-stress 25K synthetic passes. **However, real
#     coding-agent workloads (OpenCode, Cline) with mixed sys-prompt +
#     tool-schema + user-message prefill shapes can still hit Cliff 1
#     mech B at ~138 MiB FFN intermediate** — PN12 patches the eager-mode
#     `SiluAndMul.forward_cuda` but vLLM's torch.compile inductor-compiled
#     FFN forward inlines the op and bypasses our pool. See issue #16.
#     If you hit this:
#       1. Switch to `tools-text.yml` (75K, fp8 KV, PN8 closes the same
#          cliff via a different mechanism that reaches the compile path)
#       2. Add `--enforce-eager` to the command list below — forces all
#          forwards through eager Python where PN12 reliably applies.
#          ~20-30% TPS hit; preserves 218K context.
#       3. Lower `--gpu-memory-utilization` to 0.94 — frees ~250 MiB
#          activation headroom; reduces effective context to ~150K.
#       * patch_pn12_ffn_pool_anchor.py — repairs PN12's anchor on dev205+
#         (silent no-op upstream; see Sandermage/genesis-vllm-patches PR #13).
#         Idempotent: skips if Genesis-side PN12 is already applied.
#       * patch_fa_max_seqlen_clamp.py  — local P104 FA softmax_lse clamp.
#       * --gpu-memory-utilization 0.985 (up from 0.98) — gives ~120 MiB
#         more to vLLM, mostly KV pool. With anchor-fixed PN12 reducing FFN
#         allocator churn, the activation budget at 218K + 0.985 stays large
#         enough for 25K-token synthetic tool prefills.
#     Verified by verify-full + verify-stress on RTX 3090 (MTP AL 2.66,
#     VRAM 23.7/24 GB). See docs/CLIFFS.md for the full diagnostic and
#     issue #16 for the real-workload gap.
#     Note: 0.99 mem-util is too aggressive on this hardware (driver/system
#     reserves ~440 MiB; vLLM startup check fails). 0.985 is the practical max.
#   - Cliff 2 (single-prompt >50–60K) STILL APPLIES — DeltaNet GDN forward
#     OOM kernel is unrelated to FFN/FA. The 218K context is for STEADY-
#     STATE accumulation across many turns, NOT for stuffing 218K of fresh
#     tokens in one request. For big single-shot prompts: dual.yml TP=2
#     (verified at 237K) or llamacpp/default (262K, different engine).
#
# Variants in this dir for reference:
#
#   File                                  Ctx     KV       Vision   Notes
#   docker-compose.yml (default)          48K     TQ3      ✅       Production-safe; below both cliffs
#   docker-compose.long-vision.yml        198K    TQ3      ✅       Long ctx + vision; Cliff 1 closed via PN12 sidecar
#   docker-compose.long-text.yml (this)   218K    TQ3      ❌       Engine-ceiling text-only at 0.985 mem-util; same Cliff 2 caveat
#   docker-compose.tools-text.yml         75K     fp8      ❌       IDE agents — fp8 KV + PN8 closes Cliff 1
#
# Run with:
#   cd <repo>/models/qwen3.6-27b/vllm/compose
#   docker compose -f docker-compose.long-text.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-long-text:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b-long-text
    restart: "no"
    ports:
      - "${PORT:-8020}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../models-cache}:/root/.cache/huggingface
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
      - ../patches/patch_pn12_ffn_pool_anchor.py:/patches/patch_pn12_ffn_pool_anchor.py:ro
      - ../patches/patch_pn12_compile_safe_custom_op.py:/patches/patch_pn12_compile_safe_custom_op.py:ro
      - ../patches/patch_fa_max_seqlen_clamp.py:/patches/patch_fa_max_seqlen_clamp.py:ro
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - GENESIS_ENABLE_P65_TURBOQUANT_SPEC_CG_DOWNGRADE=1
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
      # 2026-04-30 PM — Cliff 1 closure stack. PN12 + P104 sidecars apply
      # the file patches; these env vars enable the runtime gates.
      # P101 anchor-fixed (pending Sandermage/genesis-vllm-patches PR #12);
      # PN12 anchor-fixed via local sidecar (pending PR #13);
      # P103 chunks FLA forward; PN13 backports vllm#41235 cudagraph fix.
      - GENESIS_ENABLE_P101=1
      - GENESIS_ENABLE_P103=1
      - GENESIS_ENABLE_PN12_FFN_INTERMEDIATE_POOL=1
      - GENESIS_ENABLE_PN13_CUDA_GRAPH_LAMBDA_ARITY=1
      # FA_MAX_SEQLEN_CLAMP (our P104 sidecar) — RE-ENABLED 2026-05-01 after
      # P37/P38 test showed PN17 alone doesn't cover the TQ wrapper layer.
      # PN17 patches flash_attn.py; our P104 patches turboquant_attn.py
      # _flash_attn_varlen (line 394). At 200K chars / ~50K tokens stress on
      # long-text 205K, OOM moved from line 903 (P38 closes torch.cat peak)
      # to line 909 → 394 → flash_attn_varlen_func. Stacking PN17 + P104
      # closes both inner-FA and TQ-wrapper paths.
      - GENESIS_ENABLE_FA_MAX_SEQLEN_CLAMP=1
      # v7.64 (2026-04-30 PM) opt-ins. PN17 = Sandermage's anchored version of
      # our P104 sidecar (FA2 softmax_lse runtime clamp; targets flash_attn.py
      # rather than turboquant_attn.py — keep our P104 sidecar for the TQ wrapper
      # layer until we've verified PN17 covers that path on dev205). PN19 sets
      # max_split_size_mb=20 during model load; estimated win 200-500 MiB on
      # H100 per vllm#41268, unverified on Ampere — measure delta vs without.
      - GENESIS_ENABLE_PN17_FA2_LSE_CLAMP=1
      # P37 = MoE intermediate cache pool (no-op on dense Qwen3.6-27B but per
      # Sandermage's club-3090#16 reply also activates the buffer-manager mode
      # P38 depends on for TQ _continuation_prefill persistent workspace — the
      # actual fix for ampersandru's mech B at turboquant_attn.py:903). P22
      # (TQ shared dequant prealloc) and P38 (TQ continuation persistent
      # workspace) auto-apply on platform-eligible boots; P37 ON is the
      # documented PROD pattern from Sandermage. Testing 2026-05-01.
      - GENESIS_ENABLE_P37=1
      # PN19 disabled — costs ~120 MiB KV pool on Ampere (3.52 GiB needed at
      # 218K vs 3.4 GiB available with PN19 on); engine init fails with
      # "estimated maximum model length is 206400". Re-test if we drop ctx
      # to <=200K or measure actual memory delta on this hardware.
      # - GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT=1
      # P68/P69 disabled 2026-04-29 — see tools-text.yml header for full
      # reasoning. Short version: 8000-char threshold breaks IDE-agent
      # flows with silent finish_reason=stop. Bisected on club-3090#2.
      # - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1
      # - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
      # PN8 (v7.62.x) intentionally not enabled: at 0.98 mem-util the engine
      # ceiling (~206K) is gated by the attention block-size divisor, not
      # KV pool. PN8's KV gain has nowhere to go on this config. Tested
      # 2026-04-29 — confirmed no ctx delta with PN8 enabled.
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        # Pre-flight: Genesis patches must be populated. Empty volume mount
        # = silent no-op apply_all = boot fails later with cryptic upstream
        # error (e.g. "TurboQuant KV not supported for hybrid models", #13).
        if [ ! -f /usr/local/lib/python3.12/dist-packages/vllm/_genesis/patches/apply_all.py ]; then
          echo "ERROR: Genesis patches missing — host volume models/qwen3.6-27b/vllm/patches/genesis/ is empty." >&2
          echo "       Run from repo root before 'docker compose up':" >&2
          echo "         bash scripts/setup.sh qwen3.6-27b" >&2
          exit 1
        fi
        python3 -m vllm._genesis.patches.apply_all
        python3 /patches/patch_pn12_ffn_pool_anchor.py
        # patch_pn12_compile_safe_custom_op.py — closes the inductor-compiled
        # forward_native path that the file-edit sidecar above can't reach.
        # See issue #16 + the new sidecar's docstring.
        python3 /patches/patch_pn12_compile_safe_custom_op.py
        python3 /patches/patch_fa_max_seqlen_clamp.py
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      # 200K + 0.985 — restored from intermediate 175K + 0.97 / 130K + 0.95
      # backoffs once analysis showed the FA varlen workspace cliff at the
      # 200K-char synthetic stress is independent of max-model-len (same
      # 50 MiB / 50 MiB-free OOM at both configs). The activation-headroom
      # delta from lowering mem-util didn't reach the cliff site, so trading
      # context capacity for it was a false economy. Realistic agent
      # workloads (130K-char / 33K-token tool prefills) pass at all tested
      # configs from 130K + 0.95 up to 218K + 0.985 with the new patch
      # stack (P37/P38 + PN17 + P104 + compile-safe sidecar).
      # Cliff 2 (single-prompt ≥50–60K in GDN) is independent and still
      # applies — route those to TP=2 dual.yml or llama.cpp.
      - --max-model-len
      - "185000"
      - --gpu-memory-utilization
      - "0.975"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_3bit_nc
      # Drops the vision tower → frees ~1 GB VRAM → lifts engine ceiling from
      # 198K (long-vision at 0.98) to 218K (this variant at 0.985). This is the only difference vs long-vision.
      - --language-model-only
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --no-scheduler-reserve-full-isl
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
