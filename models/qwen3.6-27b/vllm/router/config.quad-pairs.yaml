model_list:
  - model_name: qwen3.6-27b-autoround
    litellm_params:
      model: openai/qwen3.6-27b-autoround
      api_base: http://vllm-qwen36-27b-quad-pair-a:8000/v1
      api_key: os.environ/VLLM_API_KEY
    model_info:
      id: quad-pair-a
      mode: chat
      max_input_tokens: 262144
      max_output_tokens: 262144
  - model_name: qwen3.6-27b-autoround
    litellm_params:
      model: openai/qwen3.6-27b-autoround
      api_base: http://vllm-qwen36-27b-quad-pair-b:8000/v1
      api_key: os.environ/VLLM_API_KEY
    model_info:
      id: quad-pair-b
      mode: chat
      max_input_tokens: 262144
      max_output_tokens: 262144

router_settings:
  routing_strategy: least-busy
  allowed_fails: 1
  cooldown_time: 10
  num_retries: 1
  timeout: 3600

litellm_settings:
  callbacks:
    - context_guard.proxy_handler_instance
  drop_params: true
  request_timeout: 3600
  set_verbose: false

general_settings:
  disable_spend_logs: true
