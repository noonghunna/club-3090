# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma-4-12B-it (Intel AutoRound INT8 — W8A16 on Ampere)
#   Engine:    vLLM (vllm/vllm-openai:gemma4-unified — Gemma-4 arch-preview image)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   none
#   KV:        bf16 / auto — single kv-dtype (gemma4-unified has no fp8/INT8-PTH path)
#   Vision:    yes (gemma4_unified is multimodal; served text-only here)
#   Max ctx:   256K (262144) — the FULL advertised ctx fits on ONE card. int8 weights
#              (~13 GB) + bf16 KV at gpu-mem-util 0.92 → KV pool ~433K tokens, so a
#              single 262K sequence fits (~1.6x concurrency at 262K, ~4x at 64K). gemma4
#              KV is cheap (~32 KB/tok: 8 full-attn layers + 40 SWA-1024 windowed), which
#              is why it fits. NIAH exact-recall validated 140K–241K on one 3090
#              (2026-06-04). No overlay (config ships max_position_embeddings=262144,
#              upstream fix vllm#39914).
#   Genesis:   N/A — Genesis is Qwen3-Next-specific
#   Status:    🧪 Experimental — validated single 3090 sm_86 2026-06-04 (boot + coherent
#              + 256K NIAH). 🧪 while the gemma4-unified image is an ephemeral arch-preview tag.
#   Quality:   8-pack 105/150 (70%) thinking-OFF — on par with the bf16 dual's 94/150
#              (no INT8 degradation; spread is agentic-pack variance). 2026-06-04.
#   Best for:  one 3090, Gemma-4-12B at INT8 quality with the FULL 256K context — the
#              high-fidelity single-card vLLM option. (INT4 would free VRAM for more
#              concurrency; GGUF on beellama/llama.cpp is the single-card spec-dec path.)
# ---------------------------------------------------------------------------
# Single-card sibling of the dual bf16 composes. INT8 AutoRound (Intel) runs as
# W8A16 (Marlin dequant) on sm_86 — no native INT8 compute, so this is a quality
# (vs INT4) / VRAM (vs bf16) trade, not a speedup. gemma4 parsers + the bundled
# chat template; NO overlay (the 256K p-RoPE config fix is upstream now). gemma4 KV
# is cheap enough (~32 KB/tok) that the full 262K fits one 24 GB card's KV pool.
#
# Weights:
#   hf download Intel/gemma-4-12B-it-int8-AutoRound \
#     --local-dir $MODEL_DIR/gemma-4-12b-autoround-int8
#   NOTE: the int8 repo's config.json ships max_position_embeddings=131072 (same
#   upstream lag as the unsloth bf16 mirror) — set it to 262144 to use the full ctx
#   this card's KV pool supports (the local copy on this rig is already patched).
# The arch-preview image tag may be ephemeral — pin a digest before shipping.
services:
  vllm-gemma-4-12b-int8:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-unified}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-12b-int8}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8037}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      # Uncomment to pin a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # VLLM_ENFORCE_EAGER=1 in .env disables CUDA graphs (use if graph capture OOMs).
        exec vllm serve ${VLLM_ENFORCE_EAGER:+--enforce-eager} "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/${MODEL_SUBDIR:-gemma-4-12b-autoround-int8}
      - --served-model-name
      - ${SERVED_NAME:-gemma-4-12b-int8}
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-1}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-${CTX:-262144}}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
