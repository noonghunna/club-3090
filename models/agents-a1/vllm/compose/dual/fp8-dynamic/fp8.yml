services:
  vllm-agents-a1-dual:
    
    
    
    
    
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.25.1}
    container_name: "${ESTATE_CONTAINER:-vllm-agents-a1-dual}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8072}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      # CUDA-level GPU mask — the runtime-agnostic half of GPU selection
      # (#610): launch.sh --gpus exports GPU UUIDs here. CDI runtimes (NixOS,
      # nvidia-ctk cdi) IGNORE NVIDIA_VISIBLE_DEVICES, so this mask is what
      # actually pins cards there; on the classic runtime the UUID form is
      # renumbering-proof. Unset → absent (no masking).
      - CUDA_VISIBLE_DEVICES
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - OMP_NUM_THREADS=1
      # DeepGEMM (vLLM's fp8-GEMM path) is built for Hopper (sm_90) + datacenter
      # Blackwell (sm_100/103). This is FP8-dynamic (compressed-tensors) weights →
      # it routes FP8 GEMM, so consumer Blackwell (5090 / PRO 6000 / GB10,
      # sm_120/121) hard-fails "recipe not found" at boot (disc #571). Pass-through:
      # switch.sh/launch.sh auto-inject VLLM_USE_DEEP_GEMM=0 on those cards; on raw
      # `docker compose` on a consumer Blackwell card, set it yourself. Unset =
      # vLLM's arch default (DeepGEMM stays on where it works).
      - VLLM_USE_DEEP_GEMM
      # Blackwell (sm_120) on v0.24.0: uncomment to dodge the upstream
      # kernel-selection crash — forces the Marlin weight-only path this
      # compose's gate validated (see Caveats (4) + club-3090 #548).
      # - VLLM_TEST_FORCE_FP8_MARLIN=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        
        
        
        
        source /etc/club3090/detect_nvlink.sh
        if [ "$${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$$@"
        else
          exec vllm serve --disable-custom-all-reduce "$$@"
        fi
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/Agents-A1-FP8-dynamic
      - --served-model-name
      - agents-a1
      - --quantization
      - compressed-tensors
      - --dtype
      - float16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-1}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED_TOKENS:-8192}"
      
      
      - --limit-mm-per-prompt
      - '{"image":2,"audio":0}'
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8_e4m3}"
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
