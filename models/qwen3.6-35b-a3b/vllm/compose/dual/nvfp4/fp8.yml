# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-35B-A3B NVFP4 (nvidia modelopt MIXED_PRECISION MoE:
#              NVFP4 gs16 expert FFNs + FP8-static attention/linear_attn +
#              UNQUANTIZED mtp.* head — 23.4 GB, 3B active params)
#   Topology:  Dual Hopper/Blackwell (TP=2) — 2× 5090 is the primary target;
#              required_sm=9.0 (native); fallback_sm=7.5 — sub-9.0 cards run
#              it via the Marlin W4A16 fallback (validated on the 27B sibling
#              2026-07-11; on Ampere the AutoRound tier is faster).
#   Drafter:   none — DELIBERATE. Built-in MTP is NET-NEGATIVE on this MoE
#              (-51% measured on the AutoRound tier; the head shares the MoE
#              forward — learnings/qwen3.6-35b-a3b.md). Don't re-add blind.
#   KV:        fp8 → e4m3 at scale=1.0 — SAME as the 27B NVFP4 (FP8 KV
#              declared in hf_quant_config, no k_scale/v_scale tensors shipped,
#              index-verified 2026-07-06); same regime the production 27B fp8
#              tier quality-TIED at (#594).
#   Vision:    yes (image only)
#   Max ctx:   262K (kv-calc: 15.7 GB/card on 2× 32 GB @ util 0.92 — 53% of
#              budget; ~11.7 GB/card weights, MoE KV is tiny)
#   Genesis:   none — intentionally Genesis-free
#   Status:    🧪 Experimental
#   Best for:  full-ctx fast MoE on Blackwell/Hopper pairs — pending first
#              community validation
# ---------------------------------------------------------------------------
# ⚠️ AUTHORED BLIND — READ THIS FIRST.
# NVFP4 runs on the maintainer rig (2× RTX 3090 sm_86) via the Marlin W4A16
# fallback since v0.24 (validated on the 27B sibling 2026-07-11), but this
# compose itself has not been booted yet. It mirrors the validated
# vllm/qwen-35b-a3b-dual shape (TP=2, no drafter, vision on, thinking off,
# 262K) with NVFP4 weights + fp8/e4m3 KV per NVIDIA's model-card recipe
# (--quantization modelopt). If you have 2× Hopper/Blackwell cards, YOU are
# the validation:
#   1. bash scripts/switch.sh vllm/qwen-35b-a3b-dual-nvfp4
#   2. bash scripts/verify-full.sh MODEL=qwen3.6-35b-a3b
#   3. bash scripts/rebench-full.sh
#   4. Report via the numbers-from-your-rig template (or the c3 funnel) —
#      a clean boot-failure report is a useful result.
# Known-unknowns (report either way): modelopt MoE expert-quant load on your
# arch; fp8 KV @ scale=1.0 quality on THIS checkpoint; TP=2 expert sharding
# throughput vs the AutoRound tier.
#
# Run (Blackwell/Hopper only):
#   cd <repo>/models/qwen3.6-35b-a3b/vllm/compose
#   docker compose -f dual/nvfp4/fp8.yml up -d
# ===========================================================================
# Hardware metadata (parsed by scripts/preflight.sh):
# Requires-min-vram-gb: 24
# Engine-profile: vllm-stable
# Requires-min-gpu-count: 2
# Tensor-parallel: 2
services:
  vllm-qwen36-35b-a3b-dual-nvfp4:
    # Pinned to a vLLM STABLE release (immutable, #407); the launchers inject
    # the engine-profile image over this default (#254).
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.24.0}
    container_name: "${ESTATE_CONTAINER:-vllm-qwen36-35b-a3b-dual-nvfp4}"
    restart: ${CLUB3090_RESTART:-unless-stopped}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ESTATE_PORT:-${PORT:-8079}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — warm-start across boots.
      - ../../../cache/torch_compile:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton:/root/.triton/cache
      # NVLink auto-detection — runs inside container at boot.
      - ../../../../../../scripts/detect_nvlink.sh:/etc/club3090/detect_nvlink.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${NVIDIA_VISIBLE_DEVICES:-all}}
      # CUDA-level GPU mask — the runtime-agnostic half of GPU selection
      # (#610): launch.sh --gpus exports GPU UUIDs here. CDI runtimes (NixOS,
      # nvidia-ctk cdi) IGNORE NVIDIA_VISIBLE_DEVICES, so this mask is what
      # actually pins cards there; on the classic runtime the UUID form is
      # renumbering-proof. Unset → absent (no masking).
      - CUDA_VISIBLE_DEVICES
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-${OFFLINE:-0}}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-${OFFLINE:-0}}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NVLINK_MODE=${NVLINK_MODE:-auto}
      - NCCL_CUMEM_ENABLE=0
      # Safe PCIe default (mirrors the validated dual composes); rigs with
      # working P2P set NCCL_P2P_DISABLE=0.
      - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-1}
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      # DeepGEMM (fp8-GEMM — this checkpoint's attention layers are FP8): no
      # recipe on consumer Blackwell (5090/GB10) — launchers auto-inject
      # VLLM_USE_DEEP_GEMM=0 there (disc #571); raw compose users set it.
      - VLLM_USE_DEEP_GEMM
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - bash
      - -c
      - |
        # NVLink auto-detection (sets NCCL env vars, _NVLINK_ENABLED).
        source /etc/club3090/detect_nvlink.sh
        if [ "$${_NVLINK_ENABLED:-0}" = "1" ]; then
          exec vllm serve "$$@"
        else
          exec vllm serve --disable-custom-all-reduce "$$@"
        fi
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-35b-a3b-nvfp4
      - --served-model-name
      - qwen3.6-35b-a3b
      - qwen3.6-35b-a3b-autoround
      - qwen3.6-35b-a3b-nvfp4
      # NVIDIA model-card recipe: modelopt quantization.
      - --quantization
      - modelopt
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "${TP:-2}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-262144}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-1}"
      - --max-num-batched-tokens
      - "${MAX_NUM_BATCHED_TOKENS:-8192}"
      - --limit-mm-per-prompt
      - '{"image":2,"audio":0}'
      # fp8 (= e4m3) at scale=1.0 (FP8 KV declared, no scale tensors shipped —
      # same as the 27B; hybrid disables calculate_kv_scales — the 27B fp8
      # tier tied in this regime, #594).
      # NOT fp8_e5m2 / NOT nvfp4 KV — see the single-nvfp4 header.
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8}"
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      # Prefix-caching OFF by default: MTP × prefix-cache poisons recurrent-state
      # KV on this Qwen3-Next hybrid → corrupts tool calls on chained agents
      # (#710, vllm#43559). Interim until the fix (vllm#48375) is in our pin;
      # then restore. Re-enable now: PREFIX_CACHE_ARG=--enable-prefix-caching
      - "${PREFIX_CACHE_ARG:---no-enable-prefix-caching}"
      - --enable-chunked-prefill
      # NO --speculative-config: built-in MTP is net-negative on this MoE.
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-0.6}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-20},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
