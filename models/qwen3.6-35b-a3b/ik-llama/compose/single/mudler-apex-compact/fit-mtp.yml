# ===========================================================================
# Profile (at-a-glance):
#   Model:     Qwen3.6-35B-A3B-APEX-MTP (mudler APEX I-Compact GGUF)
#   Engine:    ik_llama.cpp (ghcr.io/ikawrakow/ik-llama-cpp:cu13-server)
#   Topology:  Single 3090 (TP=1)
#   Drafter:   MTP n=4, p-min 0.0
#   KV:        q8_0 K + q5_0 V (asymmetric, K-high/V-low) + -khad/-vhad
#   Vision:    NO
#   Default ctx: 196608
#   Status:    ⚠️ Production w/ caveats — captures @laurimyllari's --fit +
#              asymmetric-KV config (discussion #241) on top of the APEX I-Compact GGUF;
#              bench + verify-stress + deterministic quality clean, sandbox-pack
#              quality pending (separate benchlocal-cli issue, not this compose).
#   Caveats:   - Sandbox quality packs (hermesagent-20, aider-polyglot-30, cli-40
#                timeouts) hit benchlocal-cli sandbox infrastructure issues 2026-05-28
#                — hermes: agent runs but tool_events=0 (suspect PR #38 thinking-on
#                sampler interaction); aider: git checkout fails before any LLM call
#                (`fatal: path 'aider/__init__.py' does not exist in 'f46766c'`).
#                Tracking separately. NOT a model or compose fault — deterministic
#                packs (6 of 8) score 76/90 = 84% on PR #38-fixed verifiers.
#              - 3090 power-sensitive: numbers below at 370 W; expect lower at 230 W.
#   Quality:   toolcall-15 14/15 (93%) · instructfollow-15 15/15 (100%) ·
#              structoutput-15 14/15 (93%) · dataextract-15 11/15 (73%) ·
#              reasonmath-15 12/15 (80%) · bugfind-15 10/15 (67%) ·
#              hermesagent-20 0/20 ⚠ sandbox · cli-40 11/40 ⚠ timeouts ·
#              aider-polyglot-30 0/30 ⚠ sandbox (--full, 2026-05-28, post-PR #38)
#   Best for:  Single-card 35B-A3B sweet spot — captures the q8/q5 K-high/V-low
#              KV configuration @laurimyllari measured (~205/254 TPS on his 4090,
#              ~103/149 TPS on this 3090, 8-pack tied at ~84% deterministic).
#              On 1× 3090: +7% narr / +4% code TPS over the q4/q4 mtp.yml sibling.
# ---------------------------------------------------------------------------
# Qwen3.6-35B-A3B MoE on ik_llama.cpp — single 3090, APEX I-Compact GGUF.
#
# target: mudler/Qwen3.6-35B-A3B-APEX-MTP-GGUF
#
# Why asymmetric q8/q5 KV:
#   Picks up the @laurimyllari sweet spot from
#   https://github.com/noonghunna/club-3090/discussions/241 and the
#   Anbeeld K-high/V-low KV-quant pattern documented in docs/FAQ.md
#   ("Which KV-cache quant should I use?"): K is the sensitive side
#   so keep it at q8_0; V tolerates starvation so drop to q5_0 to
#   free VRAM for context. Beats both q4_0/q4_0 (fast lane) on quality
#   and q8_0/q8_0 (long lane) on VRAM headroom at matched context.
#
# Why --fit (no explicit -ngl pin):
#   ik_llama --fit smart-offloads layers + KV to keep the model
#   within VRAM. -ngl 99 / -ngld 99 are kept as belt-and-suspenders
#   ceilings and are no-ops when --fit succeeds.
#
# Why --no-mmap + --cache-ram 4096:
#   Both per @laurimyllari's --fit-mtp config. --no-mmap forces full
#   weight load into VRAM/host RAM up front (avoids first-request
#   prefill stalls); --cache-ram budgets host-side cache pages.
#
# Override defaults via .env or shell:
#   MODEL_DIR              host dir to mount as /models  (default: ../../../../../../models-cache)
#   GGUF_FILE              path under /models  (default: qwen3.6-35b-a3b-gguf/mudler-apex-mtp/Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf)
#   CTX_SIZE               KV pool size        (default: 196608)
#   BATCH_SIZE             llama.cpp -b        (default: 4096)
#   UBATCH_SIZE            llama.cpp -ub       (default: 1024)
#   NP                     parallel slots      (default: 1)
#   KV_TYPE_K              K quant type        (default: q8_0)
#   KV_TYPE_V              V quant type        (default: q5_0)
#   MTP_DRAFT_N_MAX        MTP draft tokens    (default: 4)
#   DRAFT_P_MIN            draft accept floor  (default: 0.0)
#   CACHE_RAM_MB           --cache-ram         (default: 4096)
#   REASONING              thinking gate       (default: off)
#   REASONING_FORMAT       reasoning routing   (default: deepseek)
#   PORT                   host port           (default: 8057)
#   CUDA_VISIBLE_DEVICES   which GPU to use    (default: 0)

services:
  ik-llama-qwen36-35b-a3b-apex-fit:
    image: ${IK_LLAMA_IMAGE:-ghcr.io/ikawrakow/ik-llama-cpp:cu13-server}
    container_name: "${ESTATE_CONTAINER:-ik-llama-qwen36-35b-a3b-apex-fit}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8057}}:8080"
    volumes:
      - "${MODEL_DIR:-../../../../../../models-cache}:/models:ro"
      - ../../../patches/apex-qwen-chat-template.jinja:/etc/apex-qwen-chat-template.jinja:ro
    command: >-
      --host 0.0.0.0
      --port 8080
      --model /models/${GGUF_FILE:-qwen3.6-35b-a3b-gguf/mudler-apex-mtp/Qwen3.6-35B-A3B-APEX-MTP-I-Compact.gguf}
      --fit
      --fit-margin 256
      -ngl 99
      --ctx-size ${CTX_SIZE:-196608}
      -b ${BATCH_SIZE:-4096}
      -ub ${UBATCH_SIZE:-1024}
      -np ${NP:-1}
      -ctk ${KV_TYPE_K:-q8_0}
      -ctv ${KV_TYPE_V:-q5_0}
      -khad
      -vhad
      -ngld 99
      --multi-token-prediction
      --draft-max ${MTP_DRAFT_N_MAX:-4}
      --draft-p-min ${DRAFT_P_MIN:-0.0}
      --recurrent-ckpt-mode auto
      --merge-qkv
      -fa on
      --no-mmap
      --cache-ram ${CACHE_RAM_MB:-4096}
      --jinja
      --chat-template-file /etc/apex-qwen-chat-template.jinja
      --parallel-tool-calls
      --reasoning ${REASONING:-off}
      --reasoning-format ${REASONING_FORMAT:-deepseek}
      --temp ${TEMP:-${TEMPERATURE:-0.6}}
      --top-p ${TOP_P:-0.95}
      --top-k ${TOP_K:-20}
      --min-p ${MIN_P:-0.0}
      --repeat-penalty ${REPEAT_PENALTY:-1.0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-${CUDA_VISIBLE_DEVICES:-0}}"]
              capabilities: [gpu]
