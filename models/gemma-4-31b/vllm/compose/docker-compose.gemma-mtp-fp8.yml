# ===========================================================================
# Gemma-4-31B-it (Intel AutoRound INT4) + Google MTP "assistant" drafter
# 2× RTX 3090 TP=2 + per-token-head fp8_e5m2 KV + ~120K ctx target.
#
# Status: COMMUNITY-CONTRIBUTED, EXPERIMENTAL.
#   Post-rebase of vLLM PR #40391 by @lisp19 (Gemma 4 KV cache page-size
#   alignment for per-token-head quantization). PR is upstream-open + stalled
#   on maintainer review; cross-rig validation by @cferra (sm_120 Blackwell
#   TP=4) and @noonghunna (sm_86 Ampere — this rig). Local rebase resolves
#   the conflict against post-Mamba-hybrid-support main.
#
# Companion to gemma-mtp.yml:
#   gemma-mtp.yml         — bf16 KV, 32K ctx (safe default, no overlays)
#   gemma-mtp-fp8.yml     — fp8 KV, ~120K ctx target (this file, vendored PRs)
#   gemma-mtp-tp1.yml     — TP=1 single-card (boot OOM on Ampere)
#
# Why this exists (the upstream-blocker chain, summarized):
#
#   On Ampere, fp8_e5m2 KV is upstream-blocked for Gemma 4 because the
#   model has interleaved attention with two head_dims:
#     - sliding/local layers: head_dim=256
#     - global/full layers:   head_dim=512
#   Per-token-head fp8 adds 8B scale meta per token → page sizes 520:1032 →
#   vLLM's unify_kv_cache_spec_page_size() rejects (no clean LCM). That
#   forces gemma-mtp.yml to bf16 KV + 32K ctx (KV pool exhausted at higher).
#
#   PR #40391 fixes this by pre-padding the global layers' page size to a
#   1040-byte factor and routing standard attention through a new
#   get_padded_attention_kv_cache_shape helper. Once merged, fp8 KV unlocks
#   ~4× more context (32K → ~120K) on Ampere.
#
# Bench targets (TBD post-validation):
#   narrative ~109 wall TPS (parity with bf16 path; KV format only affects
#                            ctx ceiling, not per-token TPS materially)
#   code      ~142 wall TPS
#   Max ctx   ~120K (4× lift vs gemma-mtp.yml's 32K)
#
# Models:
#   target: Intel/gemma-4-31B-it-int4-AutoRound  (21.2 GB, vision preserved)
#   draft : google/gemma-4-31B-it-assistant       (0.5B / 927 MB BF16)
#
# Vendored overlays (drop when upstream merges):
#   1. vLLM PR #40391 — gemma4 per-token-head fp8 KV (rebased onto post-Mamba
#      main with conflict resolved in gpu/attn_utils.py).
#      See: ../patches/vllm-pr40391-rebased/README.md
#   2. vLLM PR #42006 (whytem) + PR #41991 (the-david-oy) stacked — Gemma 4
#      tool-parser bug fixes (MTP streaming multi-tool + parser bounds).
#      See: ../patches/vllm-gemma4-tool-parser-fixes/README.md
#
# Drop both overlays when the corresponding upstream PRs land:
#   gh api repos/vllm-project/vllm/pulls/40391 --jq '.state, .merged_at'
#   gh api repos/vllm-project/vllm/pulls/42006 --jq '.state, .merged_at'
#   gh api repos/vllm-project/vllm/pulls/41991 --jq '.state, .merged_at'
# ===========================================================================
services:
  vllm-gemma-4-31b-mtp-fp8:
    image: vllm/vllm-openai:nightly-1acd67a795ebccdf9b9db7697ae9082058301657
    container_name: vllm-gemma-4-31b-mtp-fp8
    restart: "no"
    ports:
      - "${PORT:-8032}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches — first boot warms (~5-7 min);
      # subsequent boots reuse cached graphs (~3 min). Separate cache dirs
      # from gemma-mtp.yml because the overlay file set differs (cudagraph
      # capture would re-key on the patched kernel paths anyway).
      - ../cache/torch_compile_fp8:/root/.cache/vllm/torch_compile_cache
      - ../cache/triton_fp8:/root/.triton/cache
      # ---- vLLM PR #40391 overlay (rebased onto post-Mamba main) ----
      # 7 files: per-token-head fp8 KV support for Gemma 4. Drop when PR merges.
      - ../patches/vllm-pr40391-rebased/model_executor/layers/attention/attention.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/attention/attention.py:ro
      - ../patches/vllm-pr40391-rebased/model_executor/models/gemma4.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4.py:ro
      - ../patches/vllm-pr40391-rebased/v1/core/kv_cache_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/core/kv_cache_utils.py:ro
      - ../patches/vllm-pr40391-rebased/v1/kv_cache_interface.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/kv_cache_interface.py:ro
      - ../patches/vllm-pr40391-rebased/v1/worker/gpu/attn_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/gpu/attn_utils.py:ro
      - ../patches/vllm-pr40391-rebased/v1/worker/gpu_model_runner.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/gpu_model_runner.py:ro
      - ../patches/vllm-pr40391-rebased/v1/worker/kv_cache_shape_utils.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/worker/kv_cache_shape_utils.py:ro
      # ---- Gemma 4 tool-parser stacked fixes (PR #42006 + PR #41991) ----
      # 1 file: MTP streaming multi-tool + parser bounds. Drop when both PRs merge.
      - ../patches/vllm-gemma4-tool-parser-fixes/tool_parsers/gemma4_tool_parser.py:/usr/local/lib/python3.12/dist-packages/vllm/tool_parsers/gemma4_tool_parser.py:ro
      # --------------------------------------------------------------------
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-autoround-int4
      - --served-model-name
      - gemma-4-31b-autoround
      - --tensor-parallel-size
      - "2"
      - --disable-custom-all-reduce
      # ---- KV format ----
      # fp8_e5m2 unblocked by PR #40391 overlay above.
      # If validation reveals fp8_e5m2 still trips an Ampere-specific assert,
      # try setting KV_DTYPE=fp8 (vLLM auto-picks the supported subtype) or
      # fall back to gemma-mtp.yml (bf16, 32K ctx).
      - --kv-cache-dtype
      - "${KV_DTYPE:-fp8_e5m2}"
      # ---- max-model-len ceiling (TP=2, fp8 KV after PR #40391) ----
      # Theoretical: ~120K (4× lift vs bf16 KV's 32K because per-token KV is
      # ~half size with fp8). Conservative initial test: 96K with mem-util 0.95.
      # Bump to 120K once 96K validates clean.
      - --max-model-len
      - "${MAX_MODEL_LEN:-98304}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "4"
      # Vision tower: max_tokens_per_mm_item=2496 must fit in batched tokens.
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      # Tool-call support — required for soak / agent traffic that includes
      # `tools: [...]` array. The vendored tool-parser overlay above also
      # contributes here.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":4}'
