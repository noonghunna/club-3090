services:
  open-webui:
    # Pinned (was :main) — v0.9.6 live-validated 2026-06-09: image-gen + chat config
    # survive the migration. Bump deliberately, re-validate the image-gen wiring.
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    env_file:
      # Image generation: Ideogram-4 → ComfyUI (:8188). PersistentConfig — applies on a
      # FRESH volume; on an existing volume set it in Admin → Settings → Images instead.
      - ./imagegen.env
    environment:
      # Chat models — bootstrap one connection PER BACKEND on a FRESH volume (PersistentConfig),
      # pointing OWUI straight at each model's own port rather than at the LiteLLM gateway. OWUI
      # hides models from an UNREACHABLE connection, so each model appears in the picker only while
      # its gpu-mode scene is actually serving — scene-accurate, no listing dead routes. (Going via
      # LiteLLM :4000 instead would always list every catalog model, since the gateway is always up;
      # that masking is exactly what this avoids. LiteLLM stays running for other clients — it just
      # leaves OWUI's picker.) Served names match the catalog, so model IDs are unchanged:
      #   :8090 = ai-studio qwen director (uncensored prompt crafter; studio lanes call it internally,
      #           and it doubles as a general chat model). Up only in the ai-studio scene.
      #   :8010 = qwen3.6-27b-autoround     (gpu-mode qwen27b)
      #   :8051 = qwen3.6-35b-a3b-autoround (gpu-mode qwen35b-a3b)
      #   :8032 = gemma-4-31b-autoround     (gpu-mode gemma-31b)
      #   :8038 = gemma-4-12b-int8          (gpu-mode gemma12b)
      #   :8199 = deckard-40b               (gpu-mode deckard)
      # Plural *_URLS / *_KEYS are ;-separated. On an EXISTING volume the stored config wins — re-run
      # scripts/setup-ai-studio.sh (it registers these + drops a stale :4000) or set them in
      # Admin → Settings → Connections. Backends are no-auth on localhost, so the key is a placeholder.
      - OPENAI_API_BASE_URLS=http://host.docker.internal:8090/v1;http://host.docker.internal:8010/v1;http://host.docker.internal:8051/v1;http://host.docker.internal:8032/v1;http://host.docker.internal:8038/v1;http://host.docker.internal:8199/v1
      - OPENAI_API_KEYS=sk-noauth;sk-noauth;sk-noauth;sk-noauth;sk-noauth;sk-noauth
      # Ollama removed from the stack 2026-06-22 — disable the API so OWUI doesn't
      # probe a dead :11434 on boot (chat routes through the OpenAI API above).
      - ENABLE_OLLAMA_API=false
      # Leave empty → Open WebUI generates a strong random key on first boot and persists it
      # in the data volume (.webui_secret_key). NEVER ship a hardcoded shared secret (it would
      # let anyone forge session tokens). Override via the host env only to share sessions
      # across replicas: WEBUI_SECRET_KEY=<your-secret> docker compose up -d
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}

      # --- Web search / RAG ---
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=5
      - SEARXNG_QUERY_URL=http://host.docker.internal:8088/search?q=<query>&format=json

      # Fallback / additional providers (keys loaded if set in env)
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - GOOGLE_PSE_API_KEY=${GOOGLE_PSE_API_KEY:-}
      - GOOGLE_PSE_ENGINE_ID=${GOOGLE_PSE_ENGINE_ID:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - JINA_API_KEY=${JINA_API_KEY:-}

      # --- URL-paste / page loading ---
      - ENABLE_RAG_LOCAL_WEB_FETCH=true

      # --- Image/file upload, document RAG ---
      - ENABLE_RAG_HYBRID_SEARCH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  open-webui-data:
