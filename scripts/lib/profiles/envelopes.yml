# envelopes.yml — the memory-envelope injection defaults (#246 Phase 2).
# ===========================================================================
# Weights-INVARIANT per-(slug, card-class) knobs the launcher injects to spend
# a bigger card's KV pool. FIRST PASS = concurrency only: `max_num_seqs` (a
# CAP, not a reservation — raising it is ~free until the pool fills). The
# context lever (bigger max_model_len) is deferred (single-card vLLM only, and
# Cliff-2b-capped) — see /opt/ai/docs/phase2-32gb-envelope-design.md §6.3.
#
# PROVENANCE (two accepted bases — a bare row with neither is a schema error):
#
#   computed   The kv-calc pool CEILING at model-max context. Concurrency is a
#              CAPACITY question — "do N full-context sequences' KV blocks fit
#              the pool?" — not a performance one, so kv-calc answers it
#              deterministically (arithmetic, arch-INDEPENDENT; the model math
#              doesn't change across GPUs). We seed these because max_num_seqs
#              is a cap with GRACEFUL PREEMPTION (never OOM): an over-optimistic
#              ceiling costs an occasional preempt, not a crash. kv-calc is
#              sm_120-calibrated (disc #571 paulp83's real-5090 verify-stress
#              PASS), so a 32 GB projection is trusted arithmetic, not a guess.
#   validated  A real concurrency-soak on the card class (0 growth / 0 silent-
#              empty / bounded VRAM). scripts/concurrency-probe.sh produces it.
#              A `validated` block UPGRADES a `computed` row when a volunteer
#              runs the soak; keep both if you want the audit trail.
#
# So: kv-calc proposes the ceiling (computed), the probe confirms it (validated).
# Every row MUST carry one block or the other (test-envelopes REDs otherwise).
#
# HOW IT INJECTS: launch.sh/switch.sh detect the card class (hardware profile
# id). If a row exists for (slug, card-class) with a value ABOVE the compose
# default, the launcher exports `MAX_NUM_SEQS=<value>`; the compose consumes
# `${MAX_NUM_SEQS:-<default>}`. no-row / user-env-set -> no injection (compose
# default stands). HETEROGENEOUS rigs clamp to the SMALLEST-VRAM card — that is
# exactly the pool vLLM allocates (TP symmetric-shards the KV cache, so the pool
# = min free-blocks across ranks), so a 24 GB card in the mix lands on the
# compose default while a 5090+bigger rig gets the 5090 ceiling. Consumers read
# the registry-emit join, never this file directly.
#
# Conventions:
#   max_num_seqs       concurrency cap the card's pool sustains (injected value).
#   compose_default    the slug's shipped ${MAX_NUM_SEQS:-N} default (24 GB);
#                      injection only fires when max_num_seqs > this.
#   computed           { basis: "<kv-calc invocation + PASS/cap boundary>",
#                        target_ctx: <model-max>, date: YYYY-MM-DD, note: ... }
#   validated          { concurrency_soak: "N streams @ <ctx>, 0-growth",
#                        vram_peak_gb: X, date: YYYY-MM-DD, source_tag: ... }
#   rig / submitted_by hardware fingerprint class + who ran it.
# ===========================================================================
schema_version: 1
envelopes:

  # --- computed seed (kv-calc pool ceilings @ model-max ctx) -----------------
  # Boundaries pinned 2026-07-05 by sweeping max_num_seqs through kv-calc until
  # the KV pool caps. Target context = each slug's model-max (the no-preemption
  # policy: N *full-context* concurrent sessions). 24 GB (rtx-3090) carries no
  # row — the compose default already stands there.

  vllm/dual:
    rtx-5090:
      max_num_seqs: 4          # 2 -> 4 concurrent full-262K sessions on 2x32 GB
      compose_default: 2
      computed:
        basis: "kv-calc pool ceiling — tools/kv-calc.py --compose dual --vram 32 --tp 2 --max-ctx 262144: N=4 PASS, N=5 caps"
        target_ctx: 262144
        date: 2026-07-05
        note: "no-preemption ceiling (2x RTX 5090, 64 GB). Arithmetic, sm_120-calibrated (disc #571 paulp verify-stress PASS); awaiting a concurrency-soak to upgrade to validated."
    rtx-6000-pro-blackwell:
      max_num_seqs: 8          # 2 -> 8 on 2x96 GB (NVLink-bridged workstation)
      compose_default: 2
      computed:
        basis: "kv-calc pool ceiling is ~16 (--compose dual --vram 96 --tp 2 --max-ctx 262144 --mem-util 0.96: N=16 PASS, N=20 caps), but capped to 8 — BANDWIDTH, not pool, binds. PRO 6000 GDDR7 (~1.8 TB/s) ≈ a 5090's, so useful concurrency sits near the 5090's 4, lifted to 8 by the 3x pool (less preemption); the rest of the pool is context headroom."
        target_ctx: 262144
        date: 2026-07-05
        note: "operational cap, not the raw pool ceiling (see basis). 2x RTX PRO 6000 Blackwell, NVLink-bridged. No PRO 6000 on this rig — a concurrency-soak refines this and upgrades it to validated."

  vllm/minimal:
    rtx-5090:
      max_num_seqs: 9          # 1 -> 9 concurrent full-32K sessions on 1x32 GB
      compose_default: 1
      computed:
        basis: "kv-calc pool ceiling — tools/kv-calc.py --compose minimal --vram 32 --tp 1 --max-ctx 32768: N=9 PASS, N=10 caps"
        target_ctx: 32768
        date: 2026-07-05
        note: "no-preemption ceiling (1x RTX 5090, 32 GB). Arithmetic, sm_120-calibrated (disc #571 paulp verify-stress PASS); awaiting a concurrency-soak to upgrade to validated."
    rtx-6000-pro-blackwell:
      max_num_seqs: 16         # 1 -> 16 on 1x96 GB
      compose_default: 1
      computed:
        basis: "kv-calc pool ceiling is >56 (--compose minimal --vram 96 --tp 1 --max-ctx 32768 --mem-util 0.96: N=56 still PASS), but capped to 16 — bandwidth-bound. GDDR7 ≈ a 5090's, so 16 concurrent 32K streams (small per-stream KV) is a defensible operating point on the 3x pool; the raw >56 would over-batch into throughput collapse."
        target_ctx: 32768
        date: 2026-07-05
        note: "operational cap, not the raw pool ceiling (see basis). 1x RTX PRO 6000 Blackwell. Spec-derived, no PRO 6000 on this rig — a soak refines + upgrades to validated."
    dgx-spark:
      max_num_seqs: 8          # 1 -> 8 on 1x128 GB unified (bandwidth-capped)
      compose_default: 1
      computed:
        basis: "kv-calc pool ceiling is >80 (--compose minimal --vram 128 --tp 1 --max-ctx 32768 --mem-util 0.85: N=80 still PASS), but capped to 8 — Spark's ~273 GB/s LPDDR5X (≈1/7 of a 5090) HARD-binds concurrency. Useful streams sit near a 5090's (or below), NOT scaled by the 4x pool; the pool's value here is context headroom, not more streams."
        target_ctx: 32768
        date: 2026-07-05
        note: "operational cap, bandwidth-bound (see basis). 1x DGX Spark (GB10), single-unit. TP=2 across two units is ConnectX/RDMA (network-bound) — NOT seeded for dual. No Spark on this rig — a soak refines + upgrades to validated."

  # ON BIG CARDS, POOL != CONCURRENCY. The rtx-6000-pro-blackwell and dgx-spark
  # rows above are OPERATIONAL CAPS, not raw kv-calc pool ceilings: past a point
  # decode concurrency is bound by memory BANDWIDTH, not pool size. PRO 6000
  # (~1.8 TB/s GDDR7 ≈ a 5090) lifts modestly above the 5090; Spark (~273 GB/s
  # LPDDR5X, ~1/7 of a 5090) does NOT — its huge pool buys context headroom, not
  # streams. Each row's `basis` cites the raw ceiling AND the bandwidth cap; a
  # soak on real hardware refines the operating point and upgrades to validated.
  #
  # NOT SEEDED yet (computable, deferred on purpose):
  #   MULTI-GPU (TP>2, e.g. vllm/qwen-27b-multi-fast/max @ TP=4): the injection
  #     seam ALREADY handles homogeneous >2-card rigs — it collapses N identical
  #     cards to one class, so `vllm/dual` on 4x5090 injects the dual ceiling and
  #     a TP=4 slug would inject the 4-card ceiling. kv-calc computes it too
  #     (--tp 4 --gpus 4: dual4 @ 4x5090/128 GB → N=8 ceiling @262K). Not seeded
  #     because those TP=4 slugs are `experimental` and 4x/8x-5090 rigs are rare
  #     — same kv-calc sweep seeds them the day one graduates or a volunteer
  #     appears. Heterogeneous rigs (mixed cards) clamp to the smallest-VRAM
  #     card (the pool vLLM actually allocates), so a 5090+bigger rig gets the
  #     5090 ceiling while any 24 GB card in the mix falls back to the default.
