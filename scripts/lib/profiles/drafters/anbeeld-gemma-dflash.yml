# beellama.cpp DFlash GGUF drafter (NOT the vLLM z-lab safetensors drafter
# `gemma-dflash`). The draft GGUF only carries the DFlash-specific weights — it
# shares the target's token embedding + LM head at runtime. Loaded via
# `--spec-draft-model <draft.gguf>` + `--spec-type dflash` on beellama; depth is
# adaptive (the `profit` controller). Grounded against the on-disk file used by
# models/gemma-4-31b/beellama/compose/single/beellama-q4ks-dflash/dflash.yml
# (gemma-4-31b-gguf/anbeeld-dflash-iq4xs/gemma4-31b-it-dflash-IQ4_XS.gguf, 0.84 GB).
