# beellama.cpp DFlash GGUF drafter (NOT the vLLM z-lab safetensors drafter
# `zlab-qwen-dflash`). The draft GGUF only carries the DFlash-specific weights —
# it shares the target's token embedding + LM head at runtime. Loaded via
# `--spec-draft-model <draft.gguf>` + `--spec-type dflash` on beellama; depth is
# adaptive (the `profit` controller raises/lowers active draft depth up to
# n_max). Grounded against the on-disk file used by
# models/qwen3.6-27b/beellama/compose/single/beellama-q5ks-dflash/dflash.yml
# (qwen3.6-27b-gguf/anbeeld-dflash-iq4xs/Qwen3.6-27B-DFlash-IQ4_XS.gguf, 0.93 GB).
