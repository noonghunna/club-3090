  - id: qwen-froggeric-chat-template
    model: [qwen3.6-27b, tess-4-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/froggeric-chat-template/chat_template.jinja
    load_bearing_when:
      - composes:
          - vllm/minimal
          - vllm/dual
          - vllm/tess-dual-nvfp4
        reason: "Default Qwen3.6 chat template mis-handles tool-call XML / reasoning delimiters / streaming (the #145 silent-break class); the froggeric override fixes 7 default-template defects and is behavior-critical for every tool/agent compose. Tess-4-27B (same qwen3_5 template family) additionally NEEDS it because its repo template is stock-broken (developer-role crash). Carnice/Qwopus are intentional excludes (they ship their own carnice template)."
        evidence: "models/qwen3.6-27b/vllm/patches/froggeric-chat-template/PROVENANCE.md; docs/UPSTREAM.md (froggeric template re-eval #150 / v19 adopted PR #157)"
    delivery:               # DEPRECATED/READ-ONLY (test-only) — see header
      dockerfile_bake: false
      entrypoint_invoke: true
      genesis: false
    delivery_gaps: []
    delivery_mechanism: chat_template
    delivery_spec:
      jinja: models/qwen3.6-27b/vllm/patches/froggeric-chat-template/chat_template.jinja
      mounted_at: /etc/qwen-froggeric-chat-template.jinja
      mount_mode: ro
      invoke: "--chat-template /etc/qwen-froggeric-chat-template.jinja"
      wired_at: [volumes, entrypoint]
      note: "vendored chat-template override; effective coverage is computed from the REAL merged compose graph (extends: resolved with Docker Compose merge semantics) so a child that !reset/overrides/removes the mount is caught as a coverage loss, not a false-negative."
    drift_guard:
      kind: behavioral
      check: "Streaming tool-call (XML <tool_call>) + reasoning-delimiter smoke stays green on the selected nightly with the froggeric template mounted. Any behavioral/TPS comparison the guard performs MUST use the SELF-CONTAINED symmetric restart+settle protocol: identical `docker restart <container>` on BOTH arms -> wait for /v1/models healthy -> fixed 60s settle -> >=3 bench.sh runs/arm -> compare the GRAND MEAN of the SAME canonical bench segment (NARRATIVE 800-word essay + CODE; never mix segments, never a single run); flag ONLY a deterministic regression reproduced across ALL 3 runs. (An asymmetric-restart harness fabricated a phantom -7% on #150; a non-symmetric guard flaps and gets ignored.)"
      on_fail: capability-degraded   # serves with the default template, minus the tool-call/reasoning-delimiter fixes
    capability: chat-template-override
    foundational: false
    upstream:
      ref: froggeric/Qwen-Fixed-Chat-Templates (v19 via #150/#157; v21.3 re-vendored 2026-07-17 via the #671 arc - engine-gated 07-11 rejection superseded on the v0.25.1 pin)
      status: local-vendored
      drop_when: "upstream Qwen ships a corrected default chat template and the pinned engines bundle it, OR the override is re-vendored (the same drift_guard must clear the next re-vendor)"
    status: verified

  - id: vllm-pr48375-mamba-drop-eagle-block
    model: [qwen3.6-27b, qwen3.6-35b-a3b, tess-4-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/vllm-pr48375-mamba-drop-eagle-block/install.sh
      - models/qwen3.6-27b/vllm/patches/vllm-pr48375-mamba-drop-eagle-block/patch_mamba_drop_eagle_block.py
    load_bearing_when:
      - composes:
          - vllm/dual
          - vllm/qwen-27b-dual-fast
          - vllm/qwen-27b-dual-max
          - vllm/qwen-27b-dual-balanced
          - vllm/qwen-27b-multi-fast
          - vllm/qwen-27b-multi-max
          - vllm/tess-dual-w4a16
        reason: "Vendored upstream fix vllm#48375 for vllm#43559 (MTP x prefix-caching corrupts recurrent-state KV on Qwen3-Next hybrids; ~20% acc drop reproduced upstream on 35B-A3B): MambaManager.find_longest_cache_hit receives drop_eagle_block but silently ignores it, so the final matched page's Mamba/GDN state snapshot may reflect draft tokens verification later rejected. The 9-line fix lowers the hit-search ceiling by one page. ACTIVE by default since 2026-07-17: the same PR flipped the pair-capable composes back to --enable-prefix-caching (the #720 off-default cost 7.4x TTFT on long prefixes per kevinb361's production data, and the pair-clean evidence stack is now: upstream repro+fix+tests, kevin's 7-day production at 89.5% hit rate on v0.25.x, our 6-arm probe matrix). Opt-out: PREFIX_CACHE_ARG=--no-enable-prefix-caching makes the patched path dormant again. On-rig validation 2026-07-17: no-harm on both hybrid families (27B + 35B-A3B, MTP n=3 + prefix-ON: 12/12 post-agent tool-call probes clean per arm with prefix_cache_hits_total asserted; accept-len 3.2-3.9 intact; ~5% fewer hit tokens = the by-design one-block reduction). Full 6-arm matrix: club-3090#710."
        evidence: "models/qwen3.6-27b/vllm/patches/vllm-pr48375-mamba-drop-eagle-block/README.md; club-3090#710; docs/UPSTREAM.md #43559/#48375 row"
    delivery:               # DEPRECATED/READ-ONLY (test-only) — see header
      dockerfile_bake: false
      entrypoint_invoke: true
      genesis: false
    delivery_gaps: []
    delivery_mechanism: install_script
    delivery_spec:
      script: models/qwen3.6-27b/vllm/patches/vllm-pr48375-mamba-drop-eagle-block/install.sh
      mounted_at: /etc/club3090/pr48375
      invoke: "bash /etc/club3090/pr48375/install.sh"
      invoked_before: vllm-serve
      wired_at: [volumes, entrypoint]
      note: "Idempotent, anchor-based (class MambaManager + the max_num_blocks line; anchors verified byte-stable on v0.25.1). Failure policy: anchor drift -> boot REFUSED (exit 1 in entrypoint) - never a silent half-wire, because a user who flipped PREFIX_CACHE_ARG on a re-pinned image would otherwise serve the vulnerable path while the compose claims the fix. Wired ONLY on the pair-capable composes (ship an actual --speculative-config MTP arg + the PREFIX_CACHE_ARG seam): the 5 qwen MTP composes + tess w4a16 (seam added with the wiring). The seam-only no-MTP composes (35b-a3b trio, minimal, dual/nvfp4-mtp) are NOT wired - prefix-cache-alone is clean (the corruption needs the PAIR)."
    drift_guard:
      kind: boot
      check: "Entrypoint runs install.sh before serve; boot log contains '[pr48375] applied' (first boot) or '[pr48375] already patched' (warm layer). Anchor drift -> '[pr48375] REFUSE' + container exit 1 (never serves). Runtime (prefix caching is the DEFAULT on these composes since 2026-07-17): post-agent held-prefix tool-call probes stay clean AND vllm:prefix_cache_hits_total grows (the #710 probe-validity rule)."
      on_fail: boot-refused
    status: verified
    capability: mtp-prefix-cache-safety
    foundational: false
    upstream:
      ref: "vllm#43559 (bug; upstream-reproduced ~20% acc drop on 35B-A3B) / vllm#48375 (fix PR, OPEN — this vendors its 9-line delta)"
      status: local-vendored
      drop_when: "vllm#48375 merges upstream AND the vllm-stable pin moves past it -> remove the 6 compose mounts + entrypoint calls + the patch dir; retire this row (re-run the #710 probe protocol on the new pin first)."

  - id: qwen-w4a8-int8-act
    model: [qwen3.6-27b]
    files:
      - models/qwen3.6-27b/vllm/patches/w4a8-int8-act/install.sh
      - models/qwen3.6-27b/vllm/patches/w4a8-int8-act/patch-inc-w4a8.py
      - models/qwen3.6-27b/vllm/patches/w4a8-int8-act/patch-negscale-fold.py
    load_bearing_when:
      - composes:
          - vllm/dual
          - vllm/minimal
          - vllm/qwen-27b-multi-fast
        reason: "Enables the STOCK serve-time W4A8 toggle (VLLM_MARLIN_INPUT_DTYPE=int8 — int8 activations on the int4 weights, +50% prefill / decode ~neutral dual (env-only A/B), 8-pack-tied 110/111 vs 109) on auto-round checkpoints: vLLM's inc route silently drops the toggle (bug A), and the int8 kernel reads group scales UNSIGNED while AutoRound emits ~50% negative scales → garbage (bug B; load-time sign-fold, exact except 0.61% of weights). BOTH patches are NO-OPS while the env is unset, so they ship applied-always with zero default-path behavior change. Forensics + measurements: club-3090#609."
        evidence: "models/qwen3.6-27b/vllm/patches/w4a8-int8-act/README.md; club-3090#609 (c-17664346 + c-17666873); docs/UPSTREAM.md W4A8 rows"
    delivery:               # DEPRECATED/READ-ONLY (test-only) — see header
      dockerfile_bake: false
      entrypoint_invoke: true
      genesis: false
    delivery_gaps: []
    delivery_mechanism: install_script
    delivery_spec:
      script: models/qwen3.6-27b/vllm/patches/w4a8-int8-act/install.sh
      mounted_at: /etc/club3090/w4a8
      invoke: "bash /etc/club3090/w4a8/install.sh"
      invoked_before: vllm-serve
      wired_at: [volumes, entrypoint]
      note: "Idempotent, anchor-based (anchors byte-stable v0.24.0 & v0.25.1), and a NO-OP without the env. Failure policy: anchors drifted + env SET → boot refused (never a silent half-wire); env unset → warn and serve stock. SCOPE: DENSE autoround-int4 (positive-sym int4) composes ONLY — dual/minimal/multi-fast. NOT the 35b-a3b MoE autoround (dual/preview-single): its experts go through a SEPARATE path — inc get_moe_method drops input_dtype (Bug A analog) AND the fold does not reach AutoGPTQMoEMethod.process_weights (Bug B analog); stock v0.25.1 HAS the MoE int8 GEMM (marlin_moe.py) so it is tractable but needs two more patch sites + a validation boot (open follow-up). NOT wired on fp8 (dual-max: vLLM RuntimeError 'Marlin W8A8 not supported') or nvfp4 (single/dual-nvfp4: RuntimeError 'NVFP4 weight + INT8/FP8 activation is not supported' at marlin_utils_fp4.py — FP4 is float, can't widen losslessly to int8). Those composes omit the env passthrough, so the knob can't even reach them."
    drift_guard:
      kind: behavioral
      check: "With VLLM_MARLIN_INPUT_DTYPE=int8 on the autoround ckpt: boot logs the single fold warning, prefill gains >=30% vs the same compose without the env, and completions stay coherent (logprob sanity: 'capital of Italy is' -> ' Rome' at > -1.0). Without the env: byte-identical serving behavior to the unpatched image (the no-op guarantee)."
      on_fail: capability-degraded   # env unset → stock W4A16 serving, knob unavailable
    capability: w4a8-int8-activations
    foundational: false
    upstream:
      ref: "two vLLM bugs FILED 2026-07-17: inc drops input_dtype = vllm#48904; Marlin unsigned int16 group-scale read = vllm#48905. Forensics club-3090#609."
      status: local-vendored
      drop_when: "both fixes merge upstream and land in the pinned release (re-run the drift_guard on the new pin, then delete the mount + this entry)"
    status: verified

  - id: qwen-carnice-chat-template
    deprecated_on: "2026-06-05"
