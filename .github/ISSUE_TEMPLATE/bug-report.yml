name: Bug report
description: Something isn't working — server crashes, OOM, wrong output, weird TPS regression, etc.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! The fastest path to a fix is starting with a clean
        rig-state snapshot. Run:

        ```bash
        bash scripts/report.sh > my-rig.md
        ```

        ...and paste the contents into the report field below. That single command
        captures hardware, GPU details (incl. power caps), container state, Genesis
        patch status, KV pool sizing, and the engine config — everything we'd
        otherwise have to ask for individually. Add `--verify` to include
        `verify-full.sh` output in the same dump:

        ```bash
        bash scripts/report.sh --verify > my-rig.md
        ```

        Paths under your home, hostname, username, and any HF tokens are redacted
        by default before output. Use `--no-redact` only for internal sharing.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One-paragraph summary. What did you expect, what did you see instead?
      placeholder: |
        I started `dual-turbo.yml` and it OOMs after ~30 seconds of prefill on a 32K
        message. Expected: stable serving like the README says. Actual: the
        attached log line.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands. The `compose up` line, the curl/openai-client request, etc.
      placeholder: |
        cd models/qwen3.6-27b/vllm/compose
        docker compose -f docker-compose.dual-turbo.yml up -d
        # then this curl request:
        curl -s http://localhost:8020/v1/chat/completions -d '...'
      render: bash
    validations:
      required: true

  - type: textarea
    id: rig-report
    attributes:
      label: Rig report — paste contents of `bash scripts/report.sh`
      description: |
        Run `bash scripts/report.sh > my-rig.md` from the repo root, then paste
        the contents here. Add `--verify` if you want verify-full output included.

        If you can't run the script (no shell access on the rig, etc.), note that
        in "Anything else?" below and share whatever you have.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: |
        Custom env overrides (`.env`), non-default `MEM_UTIL`, distro oddities,
        cross-references to related issues — anything beyond what `report.sh`
        captures.

        **If you couldn't run `scripts/report.sh`,** share what you can:

        - `docker logs --tail 100 <container>`
        - `nvidia-smi`
        - GPU configuration (1× / 2× cards, NVLink yes/no, power cap)
        - Compose variant + club-3090 commit (`git rev-parse --short HEAD`)
