name: Numbers from your rig
description: Cross-rig TPS / context-ceiling contribution. We collect these and add them to BENCHMARKS.
title: "[bench] "
labels: ["bench-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for benching! Your numbers help us tell which results are
        rig-dependent vs. universal. High-signal contributions land in our
        benchmarks table with attribution.

        The fastest way to share everything we need:

        ```bash
        bash scripts/report.sh --bench > my-rig.md
        ```

        That captures rig hardware (GPUs, power caps, NVLink, driver, OS), stack
        version (commit, Genesis pin, vLLM image SHA), boot log highlights (engine
        config, KV pool sizing, patches applied), AND runs the canonical bench
        (3 warmups + 5 measured runs of narrative + code prompts) — all in one
        ~3-5 min pass. Paste the file contents below.

        The bench prompts are pinned so your numbers are directly comparable to
        ours:

        > **Narrative prompt:** "Write a detailed 800-word essay explaining transformer attention."
        > `max_tokens=1000, temperature=0.6, top_p=0.95, top_k=20, enable_thinking=false`
        >
        > **Code prompt:** "Write a Python implementation of quicksort with comments explaining each step."
        > `max_tokens=800`, same sampling.

  - type: textarea
    id: rig-bench-report
    attributes:
      label: Rig + bench report — paste contents of `bash scripts/report.sh --bench`
      description: |
        Full output. The script captures hardware, stack, boot state, AND canonical
        bench numbers in one pass.

        Paths, hostname, username, and HF tokens are redacted by default. Use
        `--no-redact` only for internal sharing.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: |
        Anything beyond what `report.sh --bench` captures — surprising failures,
        custom flags you tested, comparison context vs other configs, etc.

        **If you couldn't run `scripts/report.sh --bench`,** share what you can:

        - GPU configuration + power caps
        - Compose variant + club-3090 commit
        - Output of `bash scripts/bench.sh`
        - Peak VRAM per card during bench (`nvidia-smi --query-gpu=memory.used --format=csv`)
